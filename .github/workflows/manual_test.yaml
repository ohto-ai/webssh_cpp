name: Manual Test

on:
  workflow_dispatch:
    inputs:
      duration:
        type: string
        description: 'How long to keep the test environment running, in minutes (max 60)'
        required: false
        default: '30'

jobs:
  manual-test:
    name: Manual Test Environment
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 65

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        submodules: 'true'
        fetch-depth: 0

    - name: Set up SSH server and test account
      id: setup
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server
        # Enable password authentication
        sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl start ssh
        # Generate a random test user and password
        TEST_USER=webssh_tester
        TEST_PASS=$(openssl rand -hex 10)
        sudo useradd -m -s /bin/bash "$TEST_USER"
        echo "$TEST_USER:$TEST_PASS" | sudo chpasswd
        echo "test_user=$TEST_USER" >> "$GITHUB_OUTPUT"
        echo "test_pass=$TEST_PASS" >> "$GITHUB_OUTPUT"

    - name: Configure and build
      shell: bash
      run: |
        cmake -Bbuild -DCMAKE_BUILD_TYPE=Release
        cmake --build build --target webssh_cpp -j4

    - name: Start webssh_cpp
      shell: bash
      run: |
        ./build/src/webssh_cpp -p 8080 &
        sleep 2
        echo "webssh_cpp started on port 8080"

    - name: Print test environment info
      shell: bash
      run: |
        echo "============================================"
        echo "  WebSSH Manual Test Environment"
        echo "============================================"
        echo ""
        echo "  webssh_cpp is running on port 8080 of this runner."
        echo "  Connect to the tmate session shown below, then"
        echo "  forward port 8080 to your local machine:"
        echo "    ssh -L 8080:localhost:8080 <tmate-ssh-address>"
        echo "  Then open http://localhost:8080/ in your browser."
        echo ""
        echo "  SSH credentials to enter in the web terminal:"
        echo "    Host     : 127.0.0.1"
        echo "    Port     : 22"
        echo "    Username : ${{ steps.setup.outputs.test_user }}"
        echo "    Password : ${{ steps.setup.outputs.test_pass }}"
        echo ""
        echo "  Environment will stay up for ${{ inputs.duration }} minutes (max 60)."
        echo "  Cancel this workflow run to shut it down early."
        echo "============================================"

    - name: Set up tmate session
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true
        detached: true

    - name: Wait for manual testing
      shell: bash
      run: |
        DURATION_INPUT="${{ inputs.duration }}"
        # Validate that the input is a positive integer; fall back to 30 if not.
        if ! [[ "$DURATION_INPUT" =~ ^[0-9]+$ ]] || [ "$DURATION_INPUT" -le 0 ]; then
          DURATION_INPUT=30
        fi
        # Cap at 60 minutes to avoid excessive runner usage.
        if [ "$DURATION_INPUT" -gt 60 ]; then
          DURATION_INPUT=60
        fi
        DURATION_SECONDS=$(( DURATION_INPUT * 60 ))
        echo "Keeping environment alive for ${DURATION_INPUT} minute(s)..."
        sleep "$DURATION_SECONDS"
