name: Test

on:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} - test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-latest, windows-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        submodules: 'true'
        fetch-depth: 0

    - name: Set up SSH server for integration tests (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server
        # Enable password authentication
        sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl start ssh
        # Create a temporary test user with a random password
        TEST_USER=webssh_testuser
        TEST_PASS=$(openssl rand -hex 8)
        sudo useradd -m -s /bin/bash "$TEST_USER"
        echo "$TEST_USER:$TEST_PASS" | sudo chpasswd
        # Export credentials for subsequent steps
        echo "TEST_SSH_HOST=127.0.0.1" >> "$GITHUB_ENV"
        echo "TEST_SSH_PORT=22" >> "$GITHUB_ENV"
        echo "TEST_SSH_USER=$TEST_USER" >> "$GITHUB_ENV"
        echo "TEST_SSH_PASS=$TEST_PASS" >> "$GITHUB_ENV"

    - name: Set up SSH server for integration tests (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        # Install and start the built-in OpenSSH server
        Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
        Start-Service sshd
        # Create a temporary test user with a cryptographically random password
        $TestUser = "webssh_testuser"
        $bytes = [byte[]]::new(8)
        [System.Security.Cryptography.RandomNumberGenerator]::Fill($bytes)
        $TestPass = [System.Convert]::ToHexString($bytes).ToLower()
        $SecPass = ConvertTo-SecureString $TestPass -AsPlainText -Force
        New-LocalUser $TestUser -Password $SecPass -PasswordNeverExpires
        # Export credentials for subsequent steps
        "TEST_SSH_HOST=127.0.0.1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "TEST_SSH_PORT=22"        | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "TEST_SSH_USER=$TestUser" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "TEST_SSH_PASS=$TestPass" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        unix_workspace_path=$(echo "${{ github.workspace }}" | sed 's/\\/\//g')
        echo "build-output-dir=${unix_workspace_path}/build" >> "$GITHUB_OUTPUT"

    - name: Configure
      shell: bash
      run: |
        cmake -B${{ steps.strings.outputs.build-output-dir }} -DCMAKE_BUILD_TYPE=Debug

    - name: Build tests
      shell: bash
      run: |
        cmake --build ${{ steps.strings.outputs.build-output-dir }} --target webssh_cpp_tests -j4

    - name: Run tests
      shell: bash
      run: |
        ctest --test-dir ${{ steps.strings.outputs.build-output-dir }} --output-on-failure
